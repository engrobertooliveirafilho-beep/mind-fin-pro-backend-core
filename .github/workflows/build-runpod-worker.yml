name: Build Eldora RunPod Worker

on:
  workflow_dispatch:
  push:
    paths:
      - 'runpod-worker/**'
      - '.github/workflows/build-runpod-worker.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-worker
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ghcr.io/engrobertooliveirafilho-beep/eldora-universal-worker:v1
