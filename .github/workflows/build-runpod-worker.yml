name: Build Eldora RunPod Worker

on:
  workflow_dispatch:
  push:
    paths:
      - 'runpod-worker/**'
      - '.github/workflows/build-runpod-worker.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./runpod-worker
          push: true
          tags: ghcr.io/${{ github.repository }}/eldora-universal-worker:v1
